<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Primordial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 8px 12px;
    font-family: monospace;
    font-size: 11px;
    color: #3a3;
    pointer-events: none;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  #ui span { opacity: 0.7; }
  #commit {
    position: fixed;
    top: 0; right: 0;
    padding: 8px 12px;
    font-family: monospace;
    font-size: 9px;
    color: #3a3;
    opacity: 0.45;
    pointer-events: none;
    letter-spacing: 0.5px;
  }
  #era {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 13px;
    color: #5a5;
    opacity: 0;
    transition: opacity 1s;
    pointer-events: none;
    text-align: center;
    letter-spacing: 2px;
  }
  #legend {
    position: fixed;
    bottom: 12px;
    left: 12px;
    font-family: monospace;
    font-size: 10px;
    pointer-events: none;
    line-height: 1.6;
  }
  #legend span { opacity: 0.75; }

  /* ── controller toggle button ── */
  #ctrl-toggle {
    position: fixed;
    bottom: 18px;
    right: 16px;
    width: 36px;
    height: 36px;
    background: rgba(0,20,0,0.75);
    border: 1px solid rgba(60,160,60,0.35);
    border-radius: 50%;
    color: #5c5;
    font-size: 16px;
    cursor: pointer;
    z-index: 20;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #ctrl-toggle.active {
    background: rgba(0,60,0,0.85);
    border-color: rgba(60,200,60,0.6);
    color: #7e7;
  }

  /* ── controller panel ── */
  #ctrl-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(3,10,3,0.96);
    border-top: 1px solid rgba(60,160,60,0.3);
    padding: 14px 16px 28px;
    padding-bottom: max(28px, env(safe-area-inset-bottom, 28px));
    z-index: 19;
    font-family: monospace;
    font-size: 11px;
    color: #5c5;
    transform: translateY(100%);
    transition: transform 0.22s ease;
  }
  #ctrl-panel.open { transform: translateY(0); }

  #ctrl-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    letter-spacing: 1.5px;
    font-size: 10px;
    opacity: 0.6;
    text-transform: uppercase;
  }

  #species-select {
    width: 100%;
    background: rgba(0,25,0,0.85);
    color: #6d6;
    border: 1px solid rgba(60,160,60,0.3);
    font-family: monospace;
    font-size: 12px;
    padding: 7px 10px;
    margin-bottom: 12px;
    border-radius: 4px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 9px;
  }
  .slider-label {
    width: 82px;
    opacity: 0.65;
    font-size: 10px;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }
  .slider-row input[type=range] {
    flex: 1;
    height: 2px;
    accent-color: #5c5;
    cursor: pointer;
  }
  .slider-val {
    width: 38px;
    text-align: right;
    font-size: 11px;
    opacity: 0.9;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <span id="pop">organisms: 0</span>
  <span id="gen">generation: 0</span>
  <span id="time">day: 0</span>
</div>
<div id="commit"></div>
<div id="era"></div>
<div id="legend"></div>

<button id="ctrl-toggle" title="Species editor">⚙</button>
<div id="ctrl-panel">
  <div id="ctrl-header">
    <span>species editor</span>
    <span id="ctrl-note" style="font-size:9px;opacity:0.4">speed/size affect new orgs</span>
  </div>
  <select id="species-select"></select>
  <div id="sliders"></div>
</div>

<script>
'use strict';

// ─── build stamp ─────────────────────────────────────────────────────────────
// Updated automatically on each commit by the deploy flow.
const BUILD_COMMIT = 'bd6d543';
document.getElementById('commit').textContent = BUILD_COMMIT;

// ─── canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SCALE = 2;
let W, H, GW, GH;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.ceil(W / SCALE);
  canvas.height = Math.ceil(H / SCALE);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  GW = canvas.width;
  GH = canvas.height;
}
resize();
window.addEventListener('resize', resize);

// ─── constants ───────────────────────────────────────────────────────────────
const TICK = 1000 / 60;
const MAX_POP = 250;
const INIT_POP = 90;
const FOOD_COUNT = 220;
const EAT_RANGE = 2;
const STARVE_BASE = 0.03;
const FOOD_VALUE = 25;
const KILL_VALUE = 35;
const SIGHT = 40;
const MUTATION = 0.08;
const MAX_SIZE = 12;

// ─── species definitions ─────────────────────────────────────────────────────
// All fields are live — sliders write directly into this array.
// metabolismMult, splitAt, photoRate take effect immediately on all orgs.
// baseSpeed, baseSize affect newly-spawned organisms only.
const SPECIES = [
  { id: 0, name: 'Photosynthesizer', color: [60, 180, 80],   baseSpeed: 0.45, baseSize: 2.5, splitAt: 160, metabolismMult: 1.0,  photoRate: 0.25 },
  { id: 1, name: 'Hunter',           color: [200, 120, 60],  baseSpeed: 0.85, baseSize: 4.0, splitAt: 160, metabolismMult: 1.2,  photoRate: 0    },
  { id: 2, name: 'Swimmer',          color: [80, 160, 200],  baseSpeed: 1.45, baseSize: 2.0, splitAt: 160, metabolismMult: 1.0,  photoRate: 0    },
  { id: 3, name: 'Archaea',          color: [160, 80, 180],  baseSpeed: 0.55, baseSize: 5.0, splitAt: 180, metabolismMult: 0.55, photoRate: 0    },
  { id: 4, name: 'Bloomer',          color: [180, 180, 60],  baseSpeed: 0.38, baseSize: 1.2, splitAt: 70,  metabolismMult: 0.8,  photoRate: 0    },
  { id: 5, name: 'Parasite',         color: [60, 180, 160],  baseSpeed: 1.0,  baseSize: 1.8, splitAt: 140, metabolismMult: 1.1,  photoRate: 0    },
];

// ─── slider config ────────────────────────────────────────────────────────────
const SLIDER_CONFIG = [
  { key: 'baseSpeed',      label: 'speed',       min: 0.1,  max: 3.0,  step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'baseSize',       label: 'base size',   min: 0.5,  max: 12,   step: 0.1,  fmt: v => v.toFixed(1) },
  { key: 'splitAt',        label: 'split at',    min: 30,   max: 400,  step: 5,    fmt: v => Math.round(v) },
  { key: 'metabolismMult', label: 'metabolism',  min: 0.1,  max: 3.0,  step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'photoRate',      label: 'photo rate',  min: 0,    max: 2.0,  step: 0.05, fmt: v => v.toFixed(2) },
];

// ─── eras (advance by day) ────────────────────────────────────────────────────
const ERAS = [
  { min: 0,    name: 'PRIMORDIAL SOUP',    bg: [0,0,0] },
  { min: 30,   name: 'BACTERIAL DAWN',     bg: [0,2,0] },
  { min: 100,  name: 'AGE OF MICROBES',    bg: [0,3,2] },
  { min: 250,  name: 'COLONIAL EMERGENCE', bg: [0,2,5] },
  { min: 500,  name: 'PREDATOR ERA',       bg: [2,0,5] },
  { min: 1000, name: 'APEX MICROBE AGE',   bg: [5,0,2] },
];

// ─── food ─────────────────────────────────────────────────────────────────────
const foods = [];
function spawnFood(x, y) {
  foods.push({
    x: x !== undefined ? x : Math.random() * GW,
    y: y !== undefined ? y : Math.random() * GH,
    value: FOOD_VALUE,
  });
}
function initFood() {
  for (let i = 0; i < FOOD_COUNT; i++) spawnFood();
}

// ─── organism ─────────────────────────────────────────────────────────────────
let nextId = 0;
let generation = 0;
const orgs = [];

function createOrg(x, y, parentDNA, forcedSpeciesId) {
  const spId = parentDNA                    ? parentDNA.speciesId
             : forcedSpeciesId !== undefined ? forcedSpeciesId
             : Math.floor(Math.random() * SPECIES.length);
  const sp = SPECIES[spId];

  const dna = parentDNA ? {
    speciesId: spId,
    color: sp.color.slice(),
    speed: Math.max(0.2, parentDNA.speed + (Math.random() - 0.5) * MUTATION * 2),
    size:  Math.max(0.8, Math.min(MAX_SIZE, parentDNA.size + (Math.random() - 0.5) * MUTATION * 3)),
    lineage: parentDNA.lineage,
  } : {
    speciesId: spId,
    color: sp.color.slice(),
    speed: sp.baseSpeed + (Math.random() - 0.5) * 0.2,
    size:  Math.max(0.8, sp.baseSize + (Math.random() - 0.5) * 1.0),
    lineage: nextId,
  };

  return {
    id: nextId++,
    x: x !== undefined ? x : Math.random() * GW,
    y: y !== undefined ? y : Math.random() * GH,
    vx: (Math.random() - 0.5) * 2,
    vy: (Math.random() - 0.5) * 2,
    energy: 80 + Math.random() * 40,
    age: 0,
    gen: generation,
    dna,
    wanderAngle: Math.random() * Math.PI * 2,
    dead: false,
  };
}

function initOrgs() {
  for (let i = 0; i < INIT_POP; i++) {
    orgs.push(createOrg(undefined, undefined, null, i % SPECIES.length));
  }
}

// ─── particles ───────────────────────────────────────────────────────────────
const particles = [];
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 2;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, color: color.slice() });
  }
}

// ─── spatial grid ─────────────────────────────────────────────────────────────
const CELL = 20;
let grid = {};
function gridKey(x, y) { return (Math.floor(x/CELL)|0) + ',' + (Math.floor(y/CELL)|0); }
function buildGrid() {
  grid = {};
  for (let i = 0; i < orgs.length; i++) {
    const o = orgs[i];
    if (o.dead) continue;
    const k = gridKey(o.x, o.y);
    if (!grid[k]) grid[k] = [];
    grid[k].push(o);
  }
}
function nearby(x, y, range) {
  const result = [];
  const cr = Math.ceil(range/CELL), cx = Math.floor(x/CELL), cy = Math.floor(y/CELL);
  for (let dx = -cr; dx <= cr; dx++)
    for (let dy = -cr; dy <= cr; dy++) {
      const k = (cx+dx) + ',' + (cy+dy);
      if (grid[k]) result.push(...grid[k]);
    }
  return result;
}

// ─── update ───────────────────────────────────────────────────────────────────
let day = 0, tick = 0;

function updateOrg(o) {
  if (o.dead) return;
  const sp = SPECIES[o.dna.speciesId];

  o.age++;
  o.energy -= STARVE_BASE * sp.metabolismMult * (1 + o.dna.size * o.dna.size * 0.04);
  if (sp.photoRate > 0) o.energy += sp.photoRate;

  if (o.energy <= 0) {
    o.dead = true;
    spawnParticles(o.x, o.y, o.dna.color, Math.ceil(o.dna.size * 2));
    for (let i = 0; i < Math.floor(o.dna.size); i++)
      spawnFood(o.x + (Math.random()-0.5)*4, o.y + (Math.random()-0.5)*4);
    return;
  }

  if (o.energy > sp.splitAt && orgs.length < MAX_POP) {
    o.energy *= 0.5;
    generation = Math.max(generation, o.gen + 1);
    const child = createOrg(o.x + (Math.random()-0.5)*4, o.y + (Math.random()-0.5)*4, o.dna);
    child.gen = o.gen + 1;
    child.energy = o.energy;
    orgs.push(child);
    spawnParticles(o.x, o.y, o.dna.color, 3);
  }

  const neighbors = nearby(o.x, o.y, SIGHT);
  let closestFood = null, closestFoodDist = Infinity;
  let closestPrey = null, closestPreyDist = Infinity;
  let closestPredator = null, closestPredatorDist = Infinity;
  let closestHost = null, closestHostDist = Infinity;

  for (let i = 0; i < neighbors.length; i++) {
    const n = neighbors[i];
    if (n === o || n.dead) continue;
    const dx = n.x - o.x, dy = n.y - o.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d > SIGHT) continue;

    if (sp.id === 5) {
      if (n.dna.speciesId !== 5 && d < closestHostDist) { closestHost = n; closestHostDist = d; }
    } else {
      const thresh = sp.id === 1 ? 0.95 : 0.85;
      if (n.dna.size < o.dna.size * thresh && d < closestPreyDist) { closestPrey = n; closestPreyDist = d; }
    }
    if (n.dna.size > o.dna.size * 1.15 && d < closestPredatorDist) { closestPredator = n; closestPredatorDist = d; }
  }

  if (sp.id !== 5) {
    for (let i = 0; i < foods.length; i++) {
      const f = foods[i];
      const dx = f.x - o.x, dy = f.y - o.y;
      const d = dx*dx + dy*dy;
      if (d < closestFoodDist) { closestFood = f; closestFoodDist = d; }
    }
    closestFoodDist = Math.sqrt(closestFoodDist);
  }

  let ax = 0, ay = 0;

  if (sp.id === 5) {
    // PARASITE: pursue and drain hosts
    if (closestPredator && closestPredatorDist < SIGHT * 0.5) {
      const dx = o.x - closestPredator.x, dy = o.y - closestPredator.y;
      const d = Math.sqrt(dx*dx+dy*dy) || 1;
      ax = dx/d*2; ay = dy/d*2;
    } else if (closestHost) {
      const dx = closestHost.x - o.x, dy = closestHost.y - o.y;
      ax = dx/(closestHostDist||1); ay = dy/(closestHostDist||1);
      if (closestHostDist < EAT_RANGE + o.dna.size + closestHost.dna.size * 0.5) {
        closestHost.energy -= 0.9;
        o.energy += 0.65;
      }
    } else {
      o.wanderAngle += (Math.random()-0.5)*0.5;
      ax = Math.cos(o.wanderAngle)*0.5; ay = Math.sin(o.wanderAngle)*0.5;
    }

  } else if (sp.id === 0) {
    // PHOTOSYNTHESIZER: drift, eat food, flee — never hunts
    if (closestPredator && closestPredatorDist < SIGHT * 0.7) {
      const dx = o.x - closestPredator.x, dy = o.y - closestPredator.y;
      const d = Math.sqrt(dx*dx+dy*dy) || 1;
      ax = dx/d*1.5; ay = dy/d*1.5;
    } else if (closestFood && closestFoodDist < SIGHT) {
      const dx = closestFood.x - o.x, dy = closestFood.y - o.y;
      ax = dx/(closestFoodDist||1)*0.5; ay = dy/(closestFoodDist||1)*0.5;
      if (closestFoodDist < EAT_RANGE + o.dna.size * 0.5) {
        o.energy += closestFood.value;
        const idx = foods.indexOf(closestFood);
        if (idx > -1) { foods.splice(idx, 1); spawnFood(); }
      }
    } else {
      o.wanderAngle += (Math.random()-0.5)*0.3;
      ax = Math.cos(o.wanderAngle)*0.3; ay = Math.sin(o.wanderAngle)*0.3;
    }

  } else {
    // STANDARD: hunter / swimmer / archaea / bloomer
    const alwaysHunts = sp.id === 1;

    if (closestPredator && closestPredatorDist < SIGHT * 0.6) {
      const dx = o.x - closestPredator.x, dy = o.y - closestPredator.y;
      const d = Math.sqrt(dx*dx+dy*dy) || 1;
      ax = dx/d*2; ay = dy/d*2;
    } else if (closestPrey && (alwaysHunts || o.energy < 60)) {
      const dx = closestPrey.x - o.x, dy = closestPrey.y - o.y;
      ax = dx/(closestPreyDist||1); ay = dy/(closestPreyDist||1);
      if (closestPreyDist < EAT_RANGE + o.dna.size) {
        closestPrey.dead = true;
        o.energy += KILL_VALUE + closestPrey.dna.size * 4 + (alwaysHunts ? 15 : 0);
        spawnParticles(closestPrey.x, closestPrey.y, closestPrey.dna.color, 6);
      }
    } else if (closestFood && closestFoodDist < SIGHT) {
      const dx = closestFood.x - o.x, dy = closestFood.y - o.y;
      ax = dx/(closestFoodDist||1); ay = dy/(closestFoodDist||1);
      if (closestFoodDist < EAT_RANGE + o.dna.size * 0.5) {
        o.energy += closestFood.value;
        const idx = foods.indexOf(closestFood);
        if (idx > -1) { foods.splice(idx, 1); spawnFood(); }
      }
    } else {
      o.wanderAngle += (Math.random()-0.5)*0.4;
      ax = Math.cos(o.wanderAngle)*0.5; ay = Math.sin(o.wanderAngle)*0.5;
    }
  }

  const spd = o.dna.speed / (1 + o.dna.size * 0.12);
  o.vx = o.vx*0.8 + ax*spd*0.3;
  o.vy = o.vy*0.8 + ay*spd*0.3;
  const vel = Math.sqrt(o.vx*o.vx+o.vy*o.vy);
  if (vel > spd) { o.vx *= spd/vel; o.vy *= spd/vel; }

  o.x += o.vx; o.y += o.vy;
  if (o.x < 0) o.x += GW;  if (o.x >= GW) o.x -= GW;
  if (o.y < 0) o.y += GH;  if (o.y >= GH) o.y -= GH;
}

// ─── rendering ───────────────────────────────────────────────────────────────
function drawOrg(o) {
  const s = Math.max(1, o.dna.size);
  const sr = Math.round(s);
  const [r, g, b] = o.dna.color;
  const alpha = Math.min(1, o.energy / 60);
  const px = Math.round(o.x), py = Math.round(o.y);
  const spId = o.dna.speciesId;

  ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha.toFixed(2)})`;

  if (sr <= 1) {
    ctx.fillRect(px, py, 1, 1);
  } else if (sr === 2) {
    ctx.fillRect(px-1, py-1, 2, 2);
  } else {
    ctx.beginPath();
    ctx.arc(px, py, s, 0, Math.PI*2);
    ctx.fill();
    if (sr >= 4) {
      ctx.fillStyle = `rgba(${Math.min(255,r+90)|0},${Math.min(255,g+90)|0},${Math.min(255,b+90)|0},${(alpha*0.5).toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(px-sr*0.25, py-sr*0.25, Math.max(1, sr*0.3), 0, Math.PI*2);
      ctx.fill();
    }
  }

  if (spId === 0 && sr >= 3) {
    ctx.fillStyle = `rgba(160,255,160,${(alpha*0.6).toFixed(2)})`;
    ctx.fillRect(px+1, py, 1, 1);
    ctx.fillRect(px-1, py, 1, 1);
  }

  const showFlagella = spId === 2 || (sr <= 3 && o.dna.speed > 0.8);
  if (showFlagella) {
    const angle = Math.atan2(o.vy, o.vx) + Math.PI;
    const len = spId === 2 ? 3.5 : 3;
    ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${spId === 2 ? 0.45 : 0.3})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + Math.cos(angle+0.3)*sr*len, py + Math.sin(angle+0.3)*sr*len);
    ctx.moveTo(px, py);
    ctx.lineTo(px + Math.cos(angle-0.3)*sr*(len-1), py + Math.sin(angle-0.3)*sr*(len-1));
    ctx.stroke();
  }
}

function drawFood(f) {
  ctx.fillStyle = `rgba(40,80,40,0.6)`;
  ctx.fillRect(Math.round(f.x), Math.round(f.y), 1, 1);
}

function drawParticle(p) {
  const [r,g,b] = p.color;
  ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${p.life.toFixed(2)})`;
  ctx.fillRect(Math.round(p.x), Math.round(p.y), 1, 1);
}

function drawBackground(era) {
  const [br, bg, bb] = era.bg;
  ctx.fillStyle = `rgb(${br},${bg},${bb})`;
  ctx.fillRect(0, 0, GW, GH);
}

// ─── era display ──────────────────────────────────────────────────────────────
let lastEraIdx = -1;
const eraEl = document.getElementById('era');
function checkEra() {
  let eraIdx = 0;
  for (let i = ERAS.length-1; i >= 0; i--) {
    if (day >= ERAS[i].min) { eraIdx = i; break; }
  }
  if (eraIdx !== lastEraIdx) {
    lastEraIdx = eraIdx;
    eraEl.textContent = ERAS[eraIdx].name;
    eraEl.style.opacity = '1';
    setTimeout(() => { eraEl.style.opacity = '0'; }, 3000);
  }
  return ERAS[eraIdx];
}

// ─── species legend ───────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
function updateLegend() {
  const counts = new Array(SPECIES.length).fill(0);
  for (let i = 0; i < orgs.length; i++) counts[orgs[i].dna.speciesId]++;
  legendEl.innerHTML = SPECIES.map(sp => {
    const [r,g,b] = sp.color;
    return `<div><span style="color:rgb(${r},${g},${b})">● ${sp.name.toLowerCase()}:${counts[sp.id]}</span></div>`;
  }).join('');
}

// ─── species controller ───────────────────────────────────────────────────────
const ctrlPanel   = document.getElementById('ctrl-panel');
const ctrlToggle  = document.getElementById('ctrl-toggle');
const speciesSel  = document.getElementById('species-select');
const slidersEl   = document.getElementById('sliders');

// populate dropdown
SPECIES.forEach(sp => {
  const opt = document.createElement('option');
  opt.value = sp.id;
  const [r,g,b] = sp.color;
  opt.textContent = `${sp.name}`;
  speciesSel.appendChild(opt);
});

function buildSliders(spId) {
  const sp = SPECIES[spId];
  slidersEl.innerHTML = '';
  SLIDER_CONFIG.forEach(cfg => {
    const row = document.createElement('div');
    row.className = 'slider-row';

    const label = document.createElement('div');
    label.className = 'slider-label';
    label.textContent = cfg.label;

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = cfg.min;
    slider.max = cfg.max;
    slider.step = cfg.step;
    slider.value = sp[cfg.key];

    const val = document.createElement('div');
    val.className = 'slider-val';
    val.textContent = cfg.fmt(sp[cfg.key]);

    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      SPECIES[spId][cfg.key] = v;
      val.textContent = cfg.fmt(v);
    });

    row.appendChild(label);
    row.appendChild(slider);
    row.appendChild(val);
    slidersEl.appendChild(row);
  });
}

speciesSel.addEventListener('change', () => buildSliders(parseInt(speciesSel.value)));

ctrlToggle.addEventListener('click', () => {
  const open = ctrlPanel.classList.toggle('open');
  ctrlToggle.classList.toggle('active', open);
  if (open) buildSliders(parseInt(speciesSel.value));
});

// disable canvas touch-action while panel is open so sliders scroll
ctrlPanel.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });

// ─── main loop ────────────────────────────────────────────────────────────────
let lastTime = 0;
const popEl = document.getElementById('pop');
const genEl = document.getElementById('gen');
const timeEl = document.getElementById('time');

initFood();
initOrgs();

function loop(ts) {
  requestAnimationFrame(loop);
  if (ts - lastTime < TICK) return;
  lastTime = ts;
  tick++;
  if (tick % 60 === 0) day++;

  if (orgs.length < 20) {
    for (let i = 0; i < 18; i++) {
      orgs.push(createOrg(undefined, undefined, null, i % SPECIES.length));
    }
  }

  buildGrid();
  for (let i = 0; i < orgs.length; i++) updateOrg(orgs[i]);
  for (let i = orgs.length-1; i >= 0; i--) { if (orgs[i].dead) orgs.splice(i, 1); }

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.9; p.vy *= 0.9;
    p.life -= 0.05;
    if (p.life <= 0) particles.splice(i, 1);
  }

  const era = checkEra();
  drawBackground(era);
  for (let i = 0; i < foods.length; i++) drawFood(foods[i]);
  for (let i = 0; i < particles.length; i++) drawParticle(particles[i]);
  if (tick % 10 === 0) orgs.sort((a,b) => a.dna.size - b.dna.size);
  for (let i = 0; i < orgs.length; i++) drawOrg(orgs[i]);

  if (tick % 30 === 0) {
    popEl.textContent = `organisms: ${orgs.length}`;
    genEl.textContent = `generation: ${generation}`;
    timeEl.textContent = `day: ${day}`;
    updateLegend();
  }
}

requestAnimationFrame(loop);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Life/sw.js').catch(() => {});
}
</script>
