<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Primordial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }

  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 8px 12px;
    font-family: monospace; font-size: 22px; color: #3a3;
    pointer-events: none;
  }
  #ui span { opacity: 0.7; }

  #hud-right {
    position: fixed; top: 8px; right: 12px;
    font-family: monospace; font-size: 22px; color: #3a3; opacity: 0.7;
    pointer-events: none; text-align: right; line-height: 1.5;
    z-index: 110;
  }

  #era {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-family: monospace; font-size: 22px; color: #5a5;
    opacity: 0; transition: opacity 1s; pointer-events: none;
    text-align: center; letter-spacing: 2px;
  }

  #legend {
    position: fixed; bottom: 12px; left: 12px;
    font-family: monospace; font-size: 18px;
    line-height: 1.6;
  }
  #legend span { opacity: 0.9; }
  .legend-row {
    padding: 2px 0;
    font-family: monospace; font-size: 18px; line-height: 1.6;
    opacity: 0.85;
  }
  .legend-flag {
    margin-left: 6px; padding: 1px 6px;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    border-radius: 2px; color: #fff;
  }
  .legend-flag.flag-t1 { background: rgba(180,140,40,0.65); }
  .legend-flag.flag-t2 { background: rgba(200,110,40,0.75); }
  .legend-flag.flag-t3 { background: rgba(210,60,60,0.85); }
  .legend-timer {
    margin-left: 4px; font-size: 12px; color: #9f9;
    letter-spacing: 0.5px;
  }
  .legend-pressure {
    margin-left: 6px; padding: 1px 5px;
    font-size: 11px; letter-spacing: 0.5px;
    border-radius: 2px;
    background: rgba(80,40,80,0.55); color: #fcf;
  }
  .legend-branch {
    margin-left: 4px; padding: 1px 5px;
    font-size: 11px; letter-spacing: 0.5px; text-transform: lowercase;
    border-radius: 2px;
    background: rgba(40,80,60,0.55); color: #cfc;
  }

  /* ── controller ── */
  #ctrl-toggle {
    position: fixed; bottom: 18px; right: 16px;
    width: 36px; height: 36px;
    background: rgba(0,20,0,0.75);
    border: 1px solid rgba(60,160,60,0.35); border-radius: 50%;
    color: #5c5; font-size: 16px; cursor: pointer;
    z-index: 110; touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
  }
  #ctrl-toggle.active { background: rgba(0,60,0,0.85); border-color: rgba(60,200,60,0.6); color: #7e7; }

  #ctrl-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(3,10,3,0.96);
    border-top: 1px solid rgba(60,160,60,0.3);
    padding: 14px 16px;
    padding-bottom: max(28px, env(safe-area-inset-bottom, 28px));
    z-index: 109;
    font-family: monospace; font-size: 11px; color: #5c5;
    transform: translateY(100%); transition: transform 0.22s ease;
    max-height: 65vh; overflow-y: auto;
  }
  #ctrl-panel.open { transform: translateY(0); }

  #ctrl-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; letter-spacing: 1.5px; font-size: 10px; opacity: 0.6; text-transform: uppercase;
  }

  #species-select {
    width: 100%;
    background: rgba(0,25,0,0.85); color: #6d6;
    border: 1px solid rgba(60,160,60,0.3); border-radius: 4px;
    font-family: monospace; font-size: 12px; padding: 7px 10px;
    margin-bottom: 12px; appearance: none; -webkit-appearance: none; cursor: pointer;
  }

  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .slider-label { width: 82px; opacity: 0.65; font-size: 10px; flex-shrink: 0; letter-spacing: 0.3px; }
  .slider-row input[type=range] { flex: 1; height: 2px; accent-color: #5c5; cursor: pointer; }
  .slider-val { width: 38px; text-align: right; font-size: 11px; opacity: 0.9; }

  #hard-refresh {
    display: block; width: 100%; margin-top: 16px;
    padding: 9px 0; border-radius: 4px;
    background: rgba(0,25,0,0.85); color: #6d6;
    border: 1px solid rgba(60,160,60,0.3);
    font-family: monospace; font-size: 12px; letter-spacing: 1px;
    cursor: pointer; touch-action: manipulation;
  }
  #hard-refresh:active { background: rgba(0,50,0,0.95); color: #9f9; }

  /* ── goal HUD (during runs) ── */
  #goal-hud {
    position: fixed; top: 46px; left: 50%; transform: translateX(-50%);
    font-family: monospace; color: #6d6; text-align: center;
    pointer-events: none; display: none;
  }
  #goal-hud.visible { display: block; }
  #goal-timer { font-size: 44px; letter-spacing: 3px; opacity: 0.95; }
  #goal-timer.locked { color: #9f9; }
  #goal-sub { font-size: 14px; opacity: 0.6; margin-top: 2px; letter-spacing: 1.5px; }

  /* ── pause button (during runs) ── */
  #pause-btn {
    position: fixed; bottom: 18px; right: 62px;
    background: rgba(0,20,0,0.75);
    border: 1px solid rgba(60,160,60,0.35); border-radius: 4px;
    color: #5c5; font-size: 11px; font-family: monospace;
    padding: 8px 12px; letter-spacing: 1px; cursor: pointer;
    z-index: 20; display: none; touch-action: manipulation;
  }
  #pause-btn.visible { display: block; }
  #pause-btn:active { background: rgba(0,60,0,0.85); color: #9f9; }

  /* ── new organism button (post-run) ── */
  #new-org-btn {
    position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,40,0,0.85);
    border: 1px solid rgba(120,220,120,0.55); border-radius: 4px;
    color: #afa; font-size: 11px; font-family: monospace;
    padding: 8px 16px; letter-spacing: 1.5px; cursor: pointer;
    z-index: 25; display: none; touch-action: manipulation;
    white-space: nowrap;
  }
  #new-org-btn.visible { display: block; }
  #new-org-btn:active { background: rgba(0,70,0,0.95); color: #fff; }

  /* ── menu overlay ── */
  #menu-root {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: flex-start; justify-content: center;
    padding: 40px 16px; overflow-y: auto;
    background: rgba(0,0,0,0.85);
    font-family: monospace; color: #9f9;
  }
  #menu-root.visible { display: flex; }

  .menu-panel {
    width: 100%; max-width: 520px;
    display: flex; flex-direction: column; gap: 12px;
    padding: 24px 20px;
  }
  .menu-panel.center { align-items: center; text-align: center; }

  .menu-title {
    font-size: 26px; letter-spacing: 4px; color: #6f6; margin: 0;
  }
  .menu-title.win  { color: #8f8; }
  .menu-title.lose { color: #f99; }
  .menu-sub {
    font-size: 13px; opacity: 0.65; margin-bottom: 8px; letter-spacing: 1px;
  }
  .menu-section-label {
    font-size: 10px; opacity: 0.5; letter-spacing: 2px;
    margin-top: 12px; text-transform: uppercase;
  }
  .menu-back {
    align-self: flex-start;
    background: none; border: none; color: #6d6; opacity: 0.7;
    font-family: monospace; font-size: 12px; cursor: pointer;
    padding: 4px 0; letter-spacing: 1px;
  }
  .menu-back:hover { opacity: 1; }

  .menu-btn {
    display: block; width: 100%;
    padding: 12px 14px; margin: 0;
    background: rgba(0,25,0,0.85); color: #6d6;
    border: 1px solid rgba(60,160,60,0.35); border-radius: 4px;
    font-family: monospace; font-size: 13px; letter-spacing: 2px;
    cursor: pointer; text-align: center; touch-action: manipulation;
  }
  .menu-btn:hover:not(:disabled) { background: rgba(0,45,0,0.9); color: #9f9; }
  .menu-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .menu-btn.primary {
    background: rgba(0,60,0,0.85); color: #afa;
    border-color: rgba(120,220,120,0.55);
  }
  .menu-btn.primary:hover:not(:disabled) { background: rgba(0,90,0,0.95); }
  .menu-btn.danger {
    color: #d77; border-color: rgba(180,80,80,0.4);
    margin-top: 20px; font-size: 11px;
  }

  .menu-list { display: flex; flex-direction: column; gap: 8px; }
  .world-card {
    display: flex; flex-direction: column; gap: 4px;
    padding: 14px 16px;
    background: rgba(0,15,0,0.7);
    border: 1px solid rgba(60,160,60,0.25); border-radius: 4px;
    font-family: monospace; cursor: pointer; text-align: left;
    color: inherit;
  }
  .world-card:hover { background: rgba(0,30,0,0.9); border-color: rgba(60,200,60,0.5); }
  .world-name { font-size: 15px; color: #9f9; letter-spacing: 1.5px; }
  .world-meta { font-size: 11px; opacity: 0.55; }

  .species-list { display: flex; flex-direction: column; gap: 6px; }
  .species-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: rgba(0,15,0,0.6);
    border: 1px solid rgba(60,160,60,0.2); border-radius: 4px;
    font-family: monospace; cursor: pointer; text-align: left;
    color: inherit;
  }
  .species-row:hover { background: rgba(0,30,0,0.85); border-color: rgba(60,200,60,0.4); }
  .species-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .species-name { flex: 1; font-size: 13px; color: #9f9; letter-spacing: 1px; }
  .species-tag { font-size: 10px; opacity: 0.55; letter-spacing: 1px; }

  .unlock-prompt {
    border: 1px solid rgba(120,220,120,0.5); border-radius: 4px;
    padding: 14px; background: rgba(0,40,0,0.6); margin: 8px 0;
  }
  .unlock-title { font-size: 13px; color: #afa; letter-spacing: 2px; }
  .unlock-sub   { font-size: 11px; opacity: 0.65; margin-top: 2px; margin-bottom: 10px; }
  .niche-grid   { display: flex; flex-direction: column; gap: 6px; }
  .niche-card {
    padding: 10px 12px;
    background: rgba(0,25,0,0.8);
    border: 1px solid rgba(60,180,60,0.4); border-radius: 3px;
    font-family: monospace; cursor: pointer; text-align: left;
    color: inherit;
  }
  .niche-card:hover { background: rgba(0,55,0,0.9); border-color: rgba(120,255,120,0.7); }
  .niche-name  { font-size: 13px; color: #afa; letter-spacing: 1.5px; }
  .niche-blurb { font-size: 11px; opacity: 0.6; margin-top: 2px; }

  .name-label { font-size: 12px; opacity: 0.75; display: flex; align-items: center; gap: 8px; }
  .name-input {
    flex: 1; background: rgba(0,25,0,0.85); color: #9f9;
    border: 1px solid rgba(60,160,60,0.3); border-radius: 3px;
    font-family: monospace; font-size: 13px; padding: 6px 10px;
  }

  .budget {
    font-size: 13px; opacity: 0.85; letter-spacing: 1px;
    padding: 8px 12px; border: 1px solid rgba(60,160,60,0.25); border-radius: 3px;
    background: rgba(0,15,0,0.5); text-align: center;
  }
  .budget-val { color: #afa; }
  .budget-val.over { color: #f88; }

  .gene-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .gene-row {
    display: grid; grid-template-columns: 110px 1fr 45px 40px;
    gap: 8px; align-items: center;
  }
  .gene-label { font-size: 11px; opacity: 0.7; letter-spacing: 0.5px; }
  .gene-row input[type=range] { accent-color: #5c5; }
  .gene-val    { font-size: 11px; text-align: right; opacity: 0.9; }
  .gene-cost   { font-size: 10px; text-align: right; opacity: 0.7; }
  .gene-cost.spend  { color: #f88; }
  .gene-cost.refund { color: #8f8; }

  .win-bonus { font-size: 13px; color: #afa; opacity: 0.85; margin: 4px 0 12px; }

  /* ── gameplay cards ── */
  .card-header {
    display: flex; align-items: baseline; justify-content: space-between;
    font-size: 15px; letter-spacing: 2px; margin-bottom: 4px;
  }
  .card-round-label { font-size: 11px; opacity: 0.5; letter-spacing: 1px; }

  .card-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-top: 10px;
  }
  .card-option {
    display: flex; flex-direction: column; gap: 10px;
    padding: 18px 12px;
    background: rgba(0,25,0,0.85);
    border: 1px solid rgba(60,180,60,0.4); border-radius: 4px;
    font-family: monospace; cursor: pointer; text-align: center;
    color: inherit; touch-action: manipulation;
  }
  .card-option:hover  { background: rgba(0,50,0,0.9); border-color: rgba(120,255,120,0.65); }
  .card-option:active { background: rgba(0,70,0,0.95); }
  .card-title { font-size: 11px; color: #afa; letter-spacing: 1.5px; line-height: 1.3; }
  .card-desc  { font-size: 12px; opacity: 0.7; line-height: 1.4; }

  .card-summary {
    display: flex; flex-direction: column; gap: 8px;
    padding: 14px; border: 1px solid rgba(60,160,60,0.25); border-radius: 4px;
    background: rgba(0,15,0,0.55); margin: 4px 0 8px;
  }
  .card-summary-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; font-size: 12px;
  }
  .card-summary-title { color: #afa; letter-spacing: 1px; flex-shrink: 0; }
  .card-summary-desc  { opacity: 0.6; font-size: 11px; text-align: right; }

  .mid-run-label {
    font-size: 11px; opacity: 0.55; letter-spacing: 1.5px; margin-bottom: 2px;
    text-transform: uppercase;
  }

  .evolution-new-org {
    width: 100%; margin-bottom: 4px;
    background: rgba(0,30,0,0.85); color: #afa;
    border: 1px solid rgba(120,220,120,0.45);
  }
  .evolution-new-org:hover { background: rgba(0,55,0,0.95); border-color: rgba(160,255,160,0.7); }

  .evolution-divider {
    font-size: 10px; opacity: 0.35; letter-spacing: 2px;
    margin: 2px 0 6px; text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <span id="pop">organisms: 0</span>
</div>
<div id="hud-right">
  <div id="commit"></div>
  <div id="time">day: 0</div>
</div>
<div id="era"></div>
<div id="legend"></div>

<button id="pause-btn">‹ menu</button>
<button id="new-org-btn">NEW ORGANISM</button>
<div id="goal-hud">
  <div id="goal-timer">0.0s</div>
  <div id="goal-sub">0 / 10 — hold for 30s</div>
</div>

<div id="menu-root"></div>

<button id="ctrl-toggle" title="Species editor">⚙</button>
<div id="ctrl-panel">
  <div id="ctrl-header">
    <span>species editor</span>
    <span style="font-size:9px;opacity:0.4">speed &amp; size update live</span>
  </div>
  <div id="global-sliders"></div>
  <div style="height:1px;background:rgba(60,160,60,0.15);margin:10px 0 12px"></div>
  <select id="species-select"></select>
  <div id="sliders"></div>
  <button id="hard-refresh">hard refresh</button>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
